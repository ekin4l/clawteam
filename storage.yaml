# storage.yaml - 统一存储配置
# 所有文件存储的目标位置配置

feishu_drive:
  # 飞书网盘根目录的 folder_token
  # 获取方式：打开飞书云文档 -> 找到目标文件夹 -> URL 中的 folder token
  # 例如：https://feishu.cn/drive/folder/fldcnXXXXXX -> folder_token 为 fldcnXXXXXX
  root_folder_token: "${FEISHU_DRIVE_ROOT_TOKEN}"

  # 各工作项的子目录（相对于 root_folder_token）
  dirs:
    daily_report: "日报"           # 日报根目录
    meeting_minutes: "会议纪要"     # 会议纪要目录
    review_report: "审核报告"       # 质量审核报告目录
    ops_docs: "运维文档"           # 运维文档目录
    archive: "归档"               # 通用归档目录
